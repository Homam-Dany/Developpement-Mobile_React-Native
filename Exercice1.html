<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List — Exercice 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rose: #F5A0BC;
      --rose-dark: #E8658C;
      --rose-light: #FDE8EF;
      --rose-soft: #FDF3F7;
      --lavender: #DFC8F5;
      --yellow: #F0E8A0;
      --white: #FFFFFF;
      --text: #3D1A28;
      --text-muted: #9A7080;
      --shadow: rgba(232, 101, 140, 0.18);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: var(--rose-soft);
      background-image: radial-gradient(circle at 80% 10%, var(--lavender) 0%, transparent 35%),
        radial-gradient(circle at 10% 90%, var(--yellow) 0%, transparent 30%);
      color: var(--text);
      padding: 48px 20px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* === HEADER === */
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 10px;
    }

    .header-badge {
      width: 56px;
      height: 56px;
      background: linear-gradient(145deg, var(--rose), var(--rose-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      box-shadow: 0 6px 20px var(--shadow);
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    h1 span {
      color: var(--rose-dark);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-weight: 500;
      margin-top: 4px;
    }

    /* === CARD PRINCIPALE === */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 4px 30px rgba(245, 160, 188, 0.15), 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    /* === BARRE D'AJOUT === */
    .add-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .add-bar input {
      flex: 1;
      padding: 13px 18px;
      border: 2px solid var(--rose-light);
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--rose-soft);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      font-weight: 500;
    }

    .add-bar input::placeholder {
      color: #C49AAA;
    }

    .add-bar input:focus {
      border-color: var(--rose);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(245, 160, 188, 0.2);
    }

    /* === BOUTONS === */
    button {
      padding: 13px 22px;
      border: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.97);
    }

    #addBtn {
      background: linear-gradient(135deg, var(--rose), var(--rose-dark));
      color: white;
      box-shadow: 0 4px 14px var(--shadow);
      white-space: nowrap;
    }

    #addBtn:hover {
      box-shadow: 0 6px 20px var(--shadow);
    }

    /* === SÉPARATEUR === */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0 14px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rose-light);
    }

    #loadBtn {
      width: 100%;
      background: var(--rose-soft);
      color: var(--rose-dark);
      border: 2px dashed var(--rose);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    #loadBtn:hover {
      background: var(--rose-light);
      transform: translateY(-1px);
    }

    /* === MESSAGES === */
    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      display: none;
      margin-bottom: 14px;
      animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .msg.ok {
      background: #D6F5E3;
      color: #166534;
      border: 1px solid #A3E3BB;
    }

    .msg.err {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5;
    }

    /* === LISTE DES TÂCHES === */
    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: var(--rose-soft);
      border: 1.5px solid var(--rose-light);
      border-radius: 14px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    li:hover {
      background: var(--rose-light);
      border-color: var(--rose);
      transform: translateX(4px);
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .task-num {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--rose-dark);
      background: var(--rose-light);
      border: 1.5px solid var(--rose);
      border-radius: 8px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .task-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-title.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .done-btn {
      padding: 7px 14px;
      font-size: 0.78rem;
      border-radius: 10px;
      background: linear-gradient(135deg, #86EFAC, #22C55E);
      color: #14532D;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.25);
    }

    .done-btn:hover {
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
    }

    .done-btn:disabled {
      background: var(--rose-light);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* === COMPTEUR === */
    .counter {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 16px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-badge">✅</div>
      <div>
        <h1>Exercice 1 — <span>To-Do List</span></h1>
      </div>
    </div>
    <p class="subtitle">Gestion de tâches via Fetch API — GET / POST / PUT</p>

    <div class="card">
      <div id="msg" class="msg"></div>

      <div class="add-bar">
        <input id="newTitle" type="text" placeholder="Nouvelle tâche à ajouter..." />
        <button id="addBtn">➕ Ajouter</button>
      </div>

      <div class="divider">ou charger depuis l'API</div>

      <button id="loadBtn">🔄 Charger les tâches (GET)</button>

      <ul id="list"></ul>
      <p class="counter" id="counter"></p>
    </div>
  </div>

  <script>
    const API = "https://jsonplaceholder.typicode.com/todos";

    const listEl = document.getElementById("list");
    const msgEl = document.getElementById("msg");
    const loadBtn = document.getElementById("loadBtn");
    const addBtn = document.getElementById("addBtn");
    const newTitleEl = document.getElementById("newTitle");
    const counterEl = document.getElementById("counter");

    let tasks = [];

    function showMessage(text, type = "ok") {
      msgEl.textContent = text;
      msgEl.className = `msg ${type}`;
      msgEl.style.display = "block";
      setTimeout(() => (msgEl.style.display = "none"), 2500);
    }

    function updateCounter() {
      if (tasks.length === 0) { counterEl.textContent = ""; return; }
      const done = tasks.filter(t => t.completed).length;
      counterEl.textContent = `${done} / ${tasks.length} tâches complétées`;
    }

    function renderTasks() {
      listEl.innerHTML = "";
      tasks.slice(0, 20).forEach((t, idx) => {
        const li = document.createElement("li");

        const left = document.createElement("div");
        left.className = "task-left";

        const num = document.createElement("span");
        num.className = "task-num";
        num.textContent = `#${t.id}`;

        const title = document.createElement("span");
        title.className = "task-title" + (t.completed ? " done" : "");
        title.textContent = t.title;

        left.appendChild(num);
        left.appendChild(title);

        const btn = document.createElement("button");
        btn.className = "done-btn";
        btn.textContent = t.completed ? "✓ Fait" : "Terminer";
        btn.disabled = t.completed;
        btn.addEventListener("click", () => markDone(idx));

        li.appendChild(left);
        li.appendChild(btn);
        listEl.appendChild(li);
      });
      updateCounter();
    }

    async function loadTasks() {
      try {
        loadBtn.textContent = "⏳ Chargement...";
        loadBtn.disabled = true;
        const res = await fetch(`${API}?_limit=15`);
        if (!res.ok) throw new Error("Erreur GET");
        tasks = await res.json();
        renderTasks();
        showMessage(`${tasks.length} tâches chargées ✅`);
      } catch (err) {
        showMessage("Erreur lors du chargement ❌", "err");
      } finally {
        loadBtn.textContent = "🔄 Charger les tâches (GET)";
        loadBtn.disabled = false;
      }
    }

    async function addTask() {
      const title = newTitleEl.value.trim();
      if (!title) { showMessage("Titre vide !", "err"); return; }
      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, completed: false, userId: 1 }),
        });
        if (!res.ok) throw new Error("Erreur POST");
        const newTask = await res.json();
        tasks.unshift(newTask);
        newTitleEl.value = "";
        renderTasks();
        showMessage(`Tâche "${title}" ajoutée (POST) ✅`);
      } catch (err) {
        showMessage("Erreur lors de l'ajout ❌", "err");
      }
    }

    async function markDone(idx) {
      const task = tasks[idx];
      try {
        const res = await fetch(`${API}/${task.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...task, completed: true }),
        });
        if (!res.ok) throw new Error("Erreur PUT");
        tasks[idx].completed = true;
        renderTasks();
        showMessage(`Tâche #${task.id} marquée comme terminée (PUT) ✅`);
      } catch (err) {
        showMessage("Erreur lors de la mise à jour ❌", "err");
      }
    }

    loadBtn.addEventListener("click", loadTasks);
    addBtn.addEventListener("click", addTask);
    newTitleEl.addEventListener("keydown", (e) => { if (e.key === "Enter") addTask(); });
  </script>
</body>

</html>
